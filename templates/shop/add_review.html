{% extends "base.html" %}
{% block title %}Добавить отзыв — {{ product.name }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm rounded-0">
                <div class="card-header bg-white border-0 pt-4 px-4">
                    <h5 class="fw-bold mb-0">Добавить отзыв на «{{ product.name }}»</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label small text-uppercase text-muted">{{ form.rating.label }}</label>
                            {{ form.rating }}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small text-uppercase text-muted">{{ form.text.label }}</label>
                            {{ form.text }}
                        </div>
                        
                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-dark rounded-0 px-4">Отправить отзыв</button>
                            <a href="{{ product.get_absolute_url }}" class="btn btn-outline-dark rounded-0 px-4">Назад к товару</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
