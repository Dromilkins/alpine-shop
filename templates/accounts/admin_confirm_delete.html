{% extends "base.html" %}
{% block title %}Удаление — Админ-панель{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm rounded-0">
                <div class="card-body p-4 text-center">
                    <div class="display-1 mb-3">⚠️</div>
                    <h3 class="fw-bold mb-3">Подтверждение удаления</h3>
                    <p class="text-muted mb-4">Вы уверены, что хотите удалить {{ type }} <strong>"{{ object }}"</strong>?</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-3 justify-content-center">
                            <button type="submit" class="btn btn-danger rounded-0 px-4">Да, удалить</button>
                            <a href="javascript:history.back()" class="btn btn-outline-dark rounded-0 px-4">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
