{% extends "base.html" %}
{% block title %}{{ title }} — Админ-панель{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="fw-bold h3 mb-4">{{ title }}</h1>
            
            <div class="card border-0 shadow-sm rounded-0">
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small text-uppercase text-muted">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}
                        
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-dark rounded-0 px-4">Сохранить</button>
                            <a href="{% url 'accounts:admin_products' %}" class="btn btn-outline-dark rounded-0">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
