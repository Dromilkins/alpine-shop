{% extends "base.html" %}
{% load static %}
{% block title %}Вход — ALPGEAR{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-5">
                <h1 class="fw-bold display-5">Вход</h1>
                <p class="text-muted">Добро пожаловать обратно</p>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4 p-lg-5">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Имя пользователя</label>
                            <input type="text" name="username" class="form-control form-control-lg rounded-3" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Пароль</label>
                            <input type="password" name="password" class="form-control form-control-lg rounded-3" required>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 py-3 rounded-3 fw-semibold">Войти</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="text-muted">Нет аккаунта? <a href="{% url 'accounts:register' %}" class="text-dark fw-semibold">Зарегистрироваться</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
