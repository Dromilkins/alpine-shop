{% extends "base.html" %}
{% block title %}Сброс пароля — Админ-панель{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-0">
                <div class="card-header bg-white border-0 pt-4 px-4">
                    <h5 class="fw-bold mb-0">Сброс пароля</h5>
                </div>
                <div class="card-body p-4">
                    <p>Пользователь: <strong>{{ target_user.username }}</strong></p>
                    <form method="post" id="resetPasswordForm">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small text-muted">Новый пароль</label>
                            <input type="password" name="new_password" class="form-control rounded-0" id="new_password" required minlength="8">
                            <div class="form-text small text-muted" id="passwordHelp">Пароль должен содержать минимум 8 символов</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small text-muted">Подтверждение пароля</label>
                            <input type="password" name="confirm_password" class="form-control rounded-0" id="confirm_password" required minlength="8">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark rounded-0">Сохранить</button>
                            <a href="{% url 'accounts:admin_users' %}" class="btn btn-outline-dark rounded-0">Отмена</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
        var password = document.getElementById('new_password').value;
        var confirm = document.getElementById('confirm_password').value;

        if (password.length < 8) {
            e.preventDefault();
            alert('Пароль должен содержать минимум 8 символов!');
            return false;
        }

        if (password !== confirm) {
            e.preventDefault();
            alert('Пароли не совпадают!');
            return false;
        }

        return true;
    });
</script>
{% endblock %}
